name: Auto-convert CONTENT.md to JSON

on:
  push:
    paths:
      - 'CONTENT.md'
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run converter
        run: node convert.js

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes detected"
          else
            git add content.json
            git commit -m "🤖 Auto: Update content.json from CONTENT.md"
            git push origin HEAD:${{ github.ref }}
          fi
