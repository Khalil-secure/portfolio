name: Auto-convert CONTENT.md to HTML & JSON

on:
  push:
    paths:
      - 'CONTENT.md'
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run converter
        run: node convert.js

      - name: Auto commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: Update content.json from CONTENT.md"
          file_pattern: "content.json"
          skip_fetch: false
          skip_checkout: false
