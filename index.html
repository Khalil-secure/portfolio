<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalil Ghiati — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1e2127;--bg2:#252930;--bg3:#2c3038;--bg4:#333840;
  --surface:#2a2f38;--border:#363c46;--border2:#424a56;
  --green:#4ade80;--green2:#22c55e;--green-dim:rgba(74,222,128,0.1);
  --blue:#60a5fa;--text:#e8ecf0;--text2:#8c9aab;--text3:#505e6e;
  --sans:'Inter',system-ui,sans-serif;--serif:'Instrument Serif',Georgia,serif;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.2),0 4px 16px rgba(0,0,0,.15);
  --shadow2:0 2px 8px rgba(0,0,0,.25),0 16px 48px rgba(0,0,0,.2);
}
html{height:100%}
body{font-family:var(--sans);color:var(--text);background:var(--bg);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 55% at 5% 5%,rgba(74,222,128,.05) 0%,transparent 55%),
  radial-gradient(ellipse 50% 40% at 95% 95%,rgba(96,165,250,.04) 0%,transparent 55%)}
.top-bar{position:sticky;top:0;z-index:100;width:100%;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:rgba(30,33,39,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{font-size:.85rem;font-weight:600;color:var(--text);position:relative;z-index:1}
.logo em{font-style:normal;color:var(--text3);font-weight:400}
nav{position:absolute;left:50%;transform:translateX(-50%);display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:4px;gap:2px;box-shadow:var(--shadow)}
.nav-btn{font-size:.76rem;font-weight:500;padding:6px 18px;border:none;background:transparent;color:var(--text3);border-radius:100px;cursor:pointer;transition:all .18s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.nav-btn svg{opacity:.5;flex-shrink:0;transition:opacity .18s}
.nav-btn:hover{color:var(--text2);background:var(--bg3)}
.nav-btn:hover svg{opacity:.8}
.nav-btn.active{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.nav-btn.active svg{opacity:1}
.top-right{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
.avail{display:flex;align-items:center;gap:7px;font-size:.73rem;color:var(--text2)}
.avail-dot{width:7px;height:7px;border-radius:50%;background:var(--green2);box-shadow:0 0 0 3px rgba(34,197,94,.15);animation:ping 2.5s infinite}
@keyframes ping{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.15)}60%{box-shadow:0 0 0 7px rgba(34,197,94,0)}}
.lang-toggle{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:3px;gap:2px}
.lang-btn{font-size:.65rem;font-weight:600;letter-spacing:.5px;padding:4px 9px;border:none;background:transparent;color:var(--text3);border-radius:4px;cursor:pointer;transition:all .18s}
.lang-btn:hover{color:var(--text2)}
.lang-btn.active{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.content-wrap{position:relative;z-index:1;padding:20px 32px 48px;display:flex;justify-content:center}
.page-box{width:100%;max-width:1220px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow2)}
.section{display:none}
.section.active{display:block;animation:rise .3s ease}
@keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
#home{display:none;grid-template-columns:1fr 1fr;min-height:80vh}
#home.active{display:grid}
.home-left{padding:56px 52px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--border);position:relative;overflow:hidden}
.home-left::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--green),transparent 60%);opacity:.45}
.eyebrow{font-size:.7rem;font-weight:500;color:var(--green);letter-spacing:.5px;margin-bottom:20px;display:flex;align-items:center;gap:10px;opacity:0;animation:rise .5s ease .1s forwards}
.eyebrow-line{width:24px;height:1px;background:var(--green);opacity:.6;flex-shrink:0}
.name{font-family:var(--serif);font-size:clamp(3rem,4.5vw,5rem);font-weight:400;line-height:.95;letter-spacing:-1px;margin-bottom:12px;opacity:0;animation:rise .5s ease .15s forwards}
.name .acc{font-style:italic;color:var(--green)}
.tagline{font-size:.82rem;color:var(--text3);margin-bottom:28px;letter-spacing:.2px;opacity:0;animation:rise .5s ease .2s forwards}
.desc{font-size:.88rem;color:var(--text2);line-height:1.85;max-width:420px;margin-bottom:40px;padding:14px 18px;background:var(--bg2);border-left:2px solid rgba(74,222,128,.4);border-radius:0 8px 8px 0;opacity:0;animation:rise .5s ease .25s forwards}
.desc strong{color:var(--text);font-weight:500}
.socials{display:flex;gap:7px;flex-wrap:wrap;opacity:0;animation:rise .5s ease .35s forwards}
.soc{display:flex;align-items:center;gap:6px;padding:7px 13px;border:1px solid var(--border2);border-radius:8px;color:var(--text2);text-decoration:none;font-size:.75rem;font-weight:500;background:var(--bg3);transition:all .18s}
.soc:hover{border-color:rgba(74,222,128,.3);color:var(--green);background:var(--green-dim);transform:translateY(-1px)}
.home-right{padding:40px 44px;display:flex;flex-direction:column;justify-content:center;background:var(--bg2);overflow-y:auto}
.stack-label{font-size:.65rem;font-weight:600;color:var(--text3);letter-spacing:1.8px;text-transform:uppercase;margin-bottom:24px;opacity:0;animation:rise .5s ease .2s forwards}
.stack-groups{display:flex;flex-direction:column;gap:20px}
.stack-group{opacity:0;animation:rise .5s ease forwards}
.stack-group:nth-child(1){animation-delay:.22s}.stack-group:nth-child(2){animation-delay:.30s}
.stack-group:nth-child(3){animation-delay:.38s}.stack-group:nth-child(4){animation-delay:.46s}
.stack-group:nth-child(5){animation-delay:.54s}
.group-title{font-size:.62rem;font-weight:600;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.group-title::after{content:'';flex:1;height:1px;background:var(--border)}
.icons-row{display:flex;flex-wrap:wrap;gap:6px}
.tech-icon{display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 11px;background:var(--surface);border:1px solid var(--border);border-radius:8px;min-width:60px;cursor:default;transition:all .2s}
.tech-icon:hover{border-color:rgba(74,222,128,.25);background:var(--bg3);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.tech-icon img{width:22px;height:22px;object-fit:contain}
.tech-icon span{font-size:.58rem;color:var(--text2);white-space:nowrap;font-weight:500}
.tech-icon:hover span{color:var(--text)}
.ti-label{font-size:.72rem;font-weight:700}
.exp-wrap{max-width:820px;margin:0 auto;padding:56px 48px}
.sec-title{font-family:var(--serif);font-size:2.5rem;font-weight:400;letter-spacing:-.5px;margin-bottom:6px}
.sec-title .acc{font-style:italic;color:var(--green)}
.sec-sub{font-size:.72rem;color:var(--text3);margin-bottom:44px;font-weight:500;letter-spacing:.3px}
.timeline{position:relative;padding-left:26px}
.timeline::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:1px;background:linear-gradient(to bottom,var(--green),var(--border),transparent)}
.exp-card{position:relative;margin-bottom:16px;padding:22px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;transition:all .18s}
.exp-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.exp-card::before{content:'';position:absolute;left:-33px;top:26px;width:8px;height:8px;border-radius:50%;background:var(--green);border:2px solid var(--surface);box-shadow:0 0 8px rgba(74,222,128,.4)}
.exp-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.exp-co{font-size:1rem;font-weight:600;color:var(--text)}
.exp-period{font-size:.67rem;color:var(--green);background:var(--green-dim);border:1px solid rgba(74,222,128,.18);padding:3px 10px;border-radius:100px;font-weight:500}
.exp-role{font-size:.78rem;color:var(--blue);margin-bottom:2px;font-weight:500}
.exp-loc{font-size:.68rem;color:var(--text3);margin-bottom:14px}
.exp-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.exp-list li{font-size:.82rem;color:var(--text2);line-height:1.7;padding-left:14px;position:relative}
.exp-list li::before{content:'–';position:absolute;left:0;color:var(--text3)}
.exp-list strong{color:var(--text);font-weight:500}
.exp-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:14px}
.exp-tag{font-size:.63rem;padding:3px 9px;border-radius:100px;font-weight:500}
.tag-infra{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.2)}
.tag-sec{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,222,128,.18)}
.tag-ml{background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.2)}
.tag-proto{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
.tag-lang{background:rgba(251,191,36,.08);color:#fbbf24;border:1px solid rgba(251,191,36,.18)}
.proj-wrap{max-width:1120px;margin:0 auto;padding:56px 48px}
.proj-toggle{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;gap:3px;width:fit-content;margin-bottom:36px}
.toggle-btn{font-size:.78rem;font-weight:500;padding:8px 20px;border:none;background:transparent;color:var(--text3);border-radius:7px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:7px}
.toggle-btn svg{opacity:.5;transition:opacity .18s;width:13px;height:13px;flex-shrink:0}
.toggle-btn:hover{color:var(--text2)}
.toggle-btn.active{background:var(--surface);color:var(--text);border:1px solid var(--border2);box-shadow:0 1px 4px rgba(0,0,0,.15)}
.toggle-btn.active svg{opacity:.8}
.toggle-btn.t-demo.active{color:var(--green);border-color:rgba(74,222,128,.2);background:var(--green-dim)}
.proj-subtitle{font-size:.68rem;color:var(--text3);margin-bottom:20px;font-weight:500;letter-spacing:.3px}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.proj-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;transition:all .18s;position:relative;overflow:hidden;text-decoration:none;color:inherit;display:block}
.proj-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--green),transparent);opacity:0;transition:opacity .2s}
.proj-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.proj-card:hover::after{opacity:.6}
.proj-link{display:block;text-decoration:none;color:inherit}
.proj-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.proj-name{font-size:.88rem;font-weight:600;flex:1;margin-right:8px;color:var(--text);transition:color .18s}
.proj-link:hover .proj-name{color:var(--green)}
.proj-arr{color:var(--text3);font-size:.8rem;transition:color .18s}
.proj-link:hover .proj-arr{color:var(--green)}
.proj-desc{font-size:.77rem;color:var(--text2);line-height:1.7;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.proj-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.proj-lang{display:flex;align-items:center;gap:5px;font-size:.68rem;color:var(--text2)}
.ldot{width:7px;height:7px;border-radius:50%}
.proj-stars{font-size:.68rem;color:var(--text2)}
.proj-upd{font-size:.62rem;color:var(--text3);margin-left:auto}
.deploy-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border:1px solid var(--border2);border-radius:100px;background:transparent;color:var(--text2);font-size:.63rem;font-weight:500;text-decoration:none;transition:all .18s;cursor:pointer;font-family:var(--sans)}
.credly-link{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:5px 12px;border:1px solid rgba(96,165,250,.25);border-radius:6px;font-size:.68rem;font-weight:500;color:var(--blue);text-decoration:none;transition:all .18s}
.credly-link:hover{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.4)}
.deploy-btn:hover{border-color:rgba(74,222,128,.3);color:var(--green)}
.demos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.demo-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:all .2s;text-decoration:none;color:inherit;display:block}
.demo-card:hover{border-color:var(--border2);box-shadow:var(--shadow2)}
.demo-thumb{position:relative;height:190px;background:linear-gradient(135deg,var(--bg3) 0%,var(--bg4) 100%);border-bottom:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center}
.demo-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
.demo-card:hover .demo-thumb img{transform:scale(1.04)}
.demo-thumb-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.demo-thumb-placeholder svg{opacity:.12;width:36px;height:36px;color:var(--green)}
.demo-thumb-placeholder span{font-size:.6rem;color:var(--text3);font-weight:500;letter-spacing:1.2px;text-transform:uppercase}
.demo-badge{position:absolute;top:10px;left:10px;font-size:.58rem;font-weight:600;padding:3px 9px;border-radius:100px;letter-spacing:.5px;text-transform:uppercase}
.badge-ai{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,222,128,.25)}
.badge-sec{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.22)}
.badge-infra{background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.2)}
.demo-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:42px;height:42px;border-radius:50%;background:rgba(30,33,39,.9);border:1px solid rgba(74,222,128,.3);display:flex;align-items:center;justify-content:center;transition:transform .25s cubic-bezier(.34,1.56,.64,1);text-decoration:none}
.demo-card:hover .demo-play{transform:translate(-50%,-50%) scale(1)}
.demo-play svg{color:var(--green);margin-left:2px}
.demo-body{padding:18px 20px}
.demo-title{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:6px}
.demo-desc{font-size:.77rem;color:var(--text2);line-height:1.7;margin-bottom:12px}
.demo-stack{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.demo-tag{font-size:.62rem;font-weight:500;padding:2px 8px;border-radius:100px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.demo-links{display:flex;gap:7px}
.demo-link{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;font-size:.73rem;font-weight:500;text-decoration:none;transition:all .18s}
.demo-link-gh{border:1px solid var(--border2);color:var(--text2);background:transparent}
.demo-link-gh:hover{border-color:var(--text);color:var(--text);background:var(--bg3)}
.demo-link-live{border:1px solid rgba(74,222,128,.25);color:var(--green);background:var(--green-dim)}
.demo-link-live:hover{background:rgba(74,222,128,.18)}
.spin-wrap{display:flex;justify-content:center;align-items:center;padding:60px;color:var(--text3);font-size:.75rem;gap:10px;grid-column:1/-1}
.spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-more{display:block;margin:20px auto 0;padding:8px 24px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:.75rem;font-weight:500;cursor:pointer;transition:all .18s}
.load-more:hover{border-color:rgba(74,222,128,.3);color:var(--green)}
.certs-wrap{max-width:900px;margin:0 auto;padding:56px 48px}
.certs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px;margin-top:32px}
.cert-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:22px;transition:all .18s}
.cert-card:hover{border-color:var(--border2);background:var(--bg3)}
.cert-ico{font-size:1.6rem;margin-bottom:10px;display:block}
.cert-ico-container{display:flex;justify-content:center;align-items:center;height:80px;margin-bottom:10px}
.cert-name{font-size:.9rem;font-weight:600;margin-bottom:3px;color:var(--text)}
.cert-iss{font-size:.68rem;color:var(--blue);margin-bottom:8px;font-weight:500}
.cert-desc{font-size:.75rem;color:var(--text2);line-height:1.65}
.cbadge{display:inline-block;margin-top:12px;padding:2px 10px;border-radius:100px;font-size:.6rem;font-weight:600;letter-spacing:.3px}
.cbg{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.cbb{background:rgba(96,165,250,.08);color:var(--blue);border:1px solid rgba(96,165,250,.18)}
.cbo{background:rgba(251,146,60,.08);color:#fb923c;border:1px solid rgba(251,146,60,.18)}
@media(max-width:860px){
  .top-bar{padding:10px 16px;flex-wrap:wrap;height:auto;gap:8px}
  nav{position:static;transform:none;order:3;width:100%;justify-content:center}
  .content-wrap{padding:8px 10px 32px}
  #home{grid-template-columns:1fr}
  .home-left{padding:36px 24px;border-right:none;border-bottom:1px solid var(--border)}
  .home-right{padding:28px 24px 36px}
  .exp-wrap,.proj-wrap,.certs-wrap{padding:36px 20px}
  .demos-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo" id="logo"></div>
  <nav>
    <button class="nav-btn active" onclick="show('home',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span id="nav-txt-home"></span>
    </button>
    <button class="nav-btn" onclick="show('experience',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
      <span id="nav-txt-exp"></span>
    </button>
    <button class="nav-btn" onclick="show('projects',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      <span id="nav-txt-proj"></span>
    </button>
    <button class="nav-btn" onclick="show('certifications',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
      <span id="nav-txt-cert"></span>
    </button>
  </nav>
  <div class="top-right">
    <div class="avail"><span class="avail-dot"></span><span id="avail-txt"></span></div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('en',this)">EN</button>
      <button class="lang-btn" onclick="setLang('fr',this)">FR</button>
    </div>
  </div>
</div>

<div class="content-wrap">
<div class="page-box">
<main>

<!-- HOME -->
<section id="home" class="section active">
  <div class="home-left" id="home-left"></div>
  <div class="home-right">
    <p class="stack-label" id="stack-label-txt"></p>
    <div class="stack-groups">
      <div class="stack-group">
        <div class="group-title">AI &amp; Automation</div>
        <div class="icons-row">
          <div class="tech-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" fill="rgba(74,222,128,.12)"/><circle cx="12" cy="12" r="3" fill="#4ade80"/><path d="M12 5v2M12 17v2M5 12h2M17 12h2" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/></svg><span>Claude API</span></div>
          <div class="tech-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span>LangGraph</span></div>

      </button>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>

<script>
// ── Navigation
function show(id, btn) {
  document.querySelectorAll('.section').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if (id === 'projects') {
    if (!window._ghLoaded) fetchRepos();
    if (!window._demosLoaded) renderDemos();
  }
}

// ── Project toggle
function switchProj(mode) {
  var cv = document.getElementById('view-code');
  var dv = document.getElementById('view-demo');
  var bc = document.getElementById('btn-code');
  var bd = document.getElementById('btn-demo');
  if (mode === 'code') {
    cv.style.display = 'block'; dv.style.display = 'none';
    bc.classList.add('active'); bd.classList.remove('active');
    if (!window._ghLoaded) fetchRepos();
  } else {
    cv.style.display = 'none'; dv.style.display = 'block';
    bd.classList.add('active'); bc.classList.remove('active');
    if (!window._demosLoaded) renderDemos();
  }
}

// ── GitHub repos
var GH_USER = 'Khalil-secure', PER = 9;
var allRepos = [], shown = 0;
var LC = {Python:'#3572A5',JavaScript:'#f1e05a',TypeScript:'#2b7489',Go:'#00ADD8',Shell:'#89e051',Rust:'#dea584',HTML:'#e34c26',CSS:'#563d7c',Dockerfile:'#384d54'};

function ago(d) {
  var days = Math.floor((Date.now() - new Date(d)) / 86400000);
  if (days === 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 30)  return days + 'd ago';
  if (days < 365) return Math.floor(days/30) + 'mo ago';
  return Math.floor(days/365) + 'y ago';
}

function fetchRepos() {
  fetch('https://api.github.com/users/' + GH_USER + '/repos?sort=updated&per_page=100&type=public')
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (!Array.isArray(data)) throw new Error();
      allRepos = data.filter(function(r){ return !r.fork; }).sort(function(a,b){ return new Date(b.updated_at) - new Date(a.updated_at); });
      window._ghLoaded = true; shown = 0;
      document.getElementById('proj-grid').innerHTML = '';
      renderRepos();
    })
    .catch(function(){
      document.getElementById('proj-grid').innerHTML = '<div class="spin-wrap">Could not fetch repos. <a href="https://github.com/' + GH_USER + '" target="_blank" style="color:var(--green);margin-left:6px">View on GitHub</a></div>';
    });
}

function renderRepos() {
  var grid = document.getElementById('proj-grid');
  allRepos.slice(shown, shown + PER).forEach(function(repo) {
    var card = document.createElement('a');
    card.className = 'proj-card';
    card.href = repo.html_url;
    card.target = '_blank';
    card.rel = 'noreferrer';
    var db = (repo.homepage && repo.homepage.startsWith('http')) ? '<button class="deploy-btn" onclick="event.preventDefault();event.stopPropagation();window.open(this.dataset.url,\'_blank\')" data-url="' + repo.homepage + '">live ↗</button>' : '';
    var lang = repo.language ? '<div class="proj-lang"><span class="ldot" style="background:' + (LC[repo.language] || '#7d8fa3') + '"></span>' + repo.language + '</div>' : '';
    var stars = repo.stargazers_count > 0 ? '<div class="proj-stars">★ ' + repo.stargazers_count + '</div>' : '';
    card.innerHTML = '<div class="proj-head"><div class="proj-name">' + repo.name + '</div><div class="proj-arr">↗</div></div><div class="proj-desc">' + (repo.description || 'No description provided.') + '</div><div class="proj-meta">' + lang + stars + '<div class="proj-upd">Updated ' + ago(repo.updated_at) + '</div>' + db + '</div>';
    grid.appendChild(card);
  });
  shown += PER;
  document.getElementById('load-more-btn').style.display = shown < allRepos.length ? 'block' : 'none';
}

function loadMore() { renderRepos(); }

window.currentLang = 'en';
// renderDemos and setLang are defined in loadContent.js
</script>

<script src="loadContent.js"></script>
